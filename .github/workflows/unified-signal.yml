name: Unified US+KR Evening Signal

# 통합(US+KR) 저녁 신호 — 실매매 본선 (2026-07-10 사용자 결정: 회사PC schtask → GH Actions 이관)
# 장점: 회사PC 단일의존(bat pull 무음실패 취약점) 제거, 시크릿(GH) 그대로 사용,
#       US 채널 발송(아침 US 단독 메시지의 후속 상품) 일원화.
# KR 데이터: quant_py-main 레포 sparse checkout (KR DB + fs_dart parquet, ~30MB).
#   16:30 KST KR EPS 수집이 push한 최신본을 18:15 KST에 읽음.
# ⚠️ 필요 시크릿: KR_REPO_TOKEN(quant_py-main 읽기 PAT — 신규 등록 필요),
#   TELEGRAM_BOT_TOKEN/TELEGRAM_PRIVATE_ID/TELEGRAM_CHAT_ID(기존), GEMINI_API_KEY(기존),
#   ECOS_API_KEY(선택 — 없으면 수출 지표만 생략).
# ⚠️ 원장 단일 작성자: 이 워크플로우가 unified_vm_log.csv의 유일한 작성자.
#   첫 성공 후 회사PC schtask(run_unified_track.bat)는 삭제할 것 (이중 기록 방지).

on:
  schedule:
    - cron: '15 9 * * 1-5'   # UTC 09:15 = KST 18:15, 월~금 (KR 16:30 수집 push 여유분 포함)
  workflow_dispatch:
    inputs:
      dry_run:
        description: 'UNIFIED_DRY_RUN=1 (발송 없이 로그만)'
        default: ''
      no_channel:
        description: '1이면 채널 발송 생략(개인봇만)'
        default: ''

concurrency:
  group: yfinance-data-fetch   # 아침 수집 워크플로우와 yf rate-limit 직렬화
  cancel-in-progress: false

permissions:
  contents: write

jobs:
  unified:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout US repo
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Checkout KR data (quant_py-main, sparse)
        uses: actions/checkout@v4
        with:
          repository: VolumeQuant/quant_py-main
          token: ${{ secrets.KR_REPO_TOKEN }}
          path: kr_repo
          sparse-checkout: |
            kr_eps_momentum/eps_momentum_data_kr.db
            data_cache/fs_dart_*.parquet
          sparse-checkout-cone-mode: false

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run unified signal
        env:
          TZ: 'Asia/Seoul'
          KR_DB_PATH: ${{ github.workspace }}/kr_repo/kr_eps_momentum/eps_momentum_data_kr.db
          KR_FS_DIR: ${{ github.workspace }}/kr_repo/data_cache
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_PRIVATE_ID: ${{ secrets.TELEGRAM_PRIVATE_ID }}
          UNIFIED_CHANNEL_ID: ${{ github.event.inputs.no_channel == '1' && '' || secrets.TELEGRAM_CHAT_ID }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          ECOS_API_KEY: ${{ secrets.ECOS_API_KEY }}
          UNIFIED_DRY_RUN: ${{ github.event.inputs.dry_run }}
        run: |
          python unified_vm_track.py

      - name: Commit ledger
        if: ${{ github.event.inputs.dry_run != '1' }}
        run: |
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"
          git add data_cache/unified_vm_log.csv
          if ! git diff --staged --quiet; then
            git commit -m "Unified signal ledger: $(date +%Y-%m-%d)"
            git pull --rebase origin master
            git push
          else
            echo "원장 변경 없음"
          fi

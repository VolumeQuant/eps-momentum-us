name: Unified US+KR Evening Signal

# 통합(US+KR) 저녁 신호 — 실매매 본선 (2026-07-10 사용자 결정: 회사PC schtask → GH Actions 이관)
# 장점: 회사PC 단일의존(bat pull 무음실패 취약점) 제거, 시크릿(GH) 그대로 사용,
#       US 채널 발송(아침 US 단독 메시지의 후속 상품) 일원화.
# KR 데이터: quant_py-main 레포 sparse checkout (KR DB + fs_dart parquet, ~30MB).
#   16:30 KST KR EPS 수집이 push한 최신본을 18:15 KST에 읽음.
# ⚠️ 필요 시크릿: KR_REPO_TOKEN(quant_py-main 읽기 PAT — 신규 등록 필요),
#   TELEGRAM_BOT_TOKEN/TELEGRAM_PRIVATE_ID/TELEGRAM_CHAT_ID(기존), GEMINI_API_KEY(기존),
#   ECOS_API_KEY(선택 — 없으면 수출 지표만 생략).
# ⚠️ 원장 단일 작성자: 이 워크플로우가 unified_vm_log.csv의 유일한 작성자.
#   첫 성공 후 회사PC schtask(run_unified_track.bat)는 삭제할 것 (이중 기록 방지).

on:
  schedule:
    # ★2026-07-14 재설계: KR 저녁 발송(KST 18~20시)은 UTC 08~11시 = GH 예약실행 최다 드롭 구간.
    #   08:20→09:07 이동에도 스케줄 2일 연속 미발동(수동 dispatch만 성공). daily-screening
    #   (UTC 20:58 한산대)은 매일 정상 = 시간대가 원인 확정. 시간 조정으론 해결 불가 →
    #   ①다중 cron(KST 18:07/19:07/20:07) + ②guard 스텝(당일 이미 원장에 블록 있으면 스킵)으로 전환.
    #   앞 시도가 드롭돼도 뒤가 잡고, 둘 다 떠도 하나만 발송(원장 당일블록 존재로 판정). concurrency로 직렬화.
    - cron: '7 9 * * 1-5'    # KST 18:07 (1차)
    - cron: '7 10 * * 1-5'   # KST 19:07 (백업)
    - cron: '7 11 * * 1-5'   # KST 20:07 (최종 백업 · UTC 11시 = 혼잡 완화)
  workflow_dispatch:
    inputs:
      dry_run:
        description: 'UNIFIED_DRY_RUN=1 (발송 없이 로그만)'
        default: ''
      no_channel:
        description: '1이면 채널 발송 생략(개인봇만)'
        default: ''

concurrency:
  group: yfinance-data-fetch   # 아침 수집 워크플로우와 yf rate-limit 직렬화
  cancel-in-progress: false

permissions:
  contents: write

jobs:
  unified:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout US repo
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      # 당일 중복발송 차단: 스케줄 실행인데 오늘 원장블록이 이미 있으면(앞선 cron이 성공) 이하 전부 스킵.
      # concurrency로 직렬화되므로 뒤 cron은 앞 cron의 push된 원장을 체크아웃해 여기서 걸러짐.
      # 수동 dispatch는 guard 스텝 자체가 스킵(if=schedule) → skip 출력 공란 → 항상 실행.
      - name: Skip if already sent today (schedule only)
        id: guard
        if: github.event_name == 'schedule'
        run: |
          TODAY=$(TZ=Asia/Seoul date +%Y-%m-%d)
          if cut -d, -f1 data_cache/unified_vm_log.csv | grep -qx "$TODAY"; then
            echo "이미 오늘($TODAY) 발송됨 — 스킵"
            echo "skip=true" >> "$GITHUB_OUTPUT"
          else
            echo "오늘($TODAY) 미발송 — 진행"
            echo "skip=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Checkout KR data (quant_py-main, sparse)
        if: steps.guard.outputs.skip != 'true'
        uses: actions/checkout@v4
        with:
          repository: VolumeQuant/quant_py-main
          token: ${{ secrets.KR_REPO_TOKEN }}
          path: kr_repo
          sparse-checkout: |
            kr_eps_momentum/eps_momentum_data_kr.db
            data_cache/fs_dart_*.parquet
            state/regime_state.json
          sparse-checkout-cone-mode: false

      - name: Set up Python
        if: steps.guard.outputs.skip != 'true'
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies
        if: steps.guard.outputs.skip != 'true'
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run unified signal
        if: steps.guard.outputs.skip != 'true'
        env:
          TZ: 'Asia/Seoul'
          KR_DB_PATH: ${{ github.workspace }}/kr_repo/kr_eps_momentum/eps_momentum_data_kr.db
          KR_FS_DIR: ${{ github.workspace }}/kr_repo/data_cache
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_PRIVATE_ID: ${{ secrets.TELEGRAM_PRIVATE_ID }}
          UNIFIED_CHANNEL_ID: ${{ github.event.inputs.no_channel == '1' && '' || secrets.TELEGRAM_CHAT_ID }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          ECOS_API_KEY: ${{ secrets.ECOS_API_KEY }}
          UNIFIED_DRY_RUN: ${{ github.event.inputs.dry_run }}
        run: |
          python unified_vm_track.py

      - name: Commit ledger
        if: ${{ github.event.inputs.dry_run != '1' && steps.guard.outputs.skip != 'true' }}
        run: |
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"
          git add data_cache/unified_vm_log.csv
          if ! git diff --staged --quiet; then
            git commit -m "Unified signal ledger: $(date +%Y-%m-%d)"
            # --autostash: compute가 만든 부수 상태파일(unstaged)이 있어도 rebase 가능
            # (2026-07-23 원장 유실 사고 — rebase가 unstaged 변경으로 거부 → 커밋만 실패)
            git pull --rebase --autostash origin master
            git push
          else
            echo "원장 변경 없음"
          fi

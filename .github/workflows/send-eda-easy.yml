name: Send easy summary (private bot, reusable)

on:
  workflow_dispatch:
    inputs:
      script:
        description: 'Send script path'
        required: false
        default: 'research/send_eda_easy_2026_07_05.py'

permissions:
  contents: read

env:
  TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
  TELEGRAM_PRIVATE_ID: ${{ secrets.TELEGRAM_PRIVATE_ID }}
  GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
  ECOS_API_KEY: ${{ secrets.ECOS_API_KEY }}

jobs:
  send:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Install deps
        run: pip install -r requirements.txt
      - name: Send
        run: python "${{ github.event.inputs.script || 'research/send_eda_easy_2026_07_05.py' }}"

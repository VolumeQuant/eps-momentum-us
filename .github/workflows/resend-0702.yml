name: Resend message (channel + private)

on:
  workflow_dispatch:
    inputs:
      market_date:
        description: 'Market date to resend (YYYY-MM-DD)'
        required: true
        default: '2026-07-02'

permissions:
  contents: write

env:
  TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
  TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
  TELEGRAM_PRIVATE_ID: ${{ secrets.TELEGRAM_PRIVATE_ID }}
  GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
  FRED_API_KEY: ${{ secrets.FRED_API_KEY }}

jobs:
  resend:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
      - name: Resend to channel + private
        run: python daily_runner.py
        env:
          TZ: 'America/New_York'
          MESSAGE_VERSION: 'v3'
          ENTRY_GAP_GATE: '1'
          ENTRY_GAP_THR: '2.5'
          MARKET_DATE: ${{ github.event.inputs.market_date }}

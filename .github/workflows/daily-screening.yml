name: Daily EPS Momentum Screening

on:
  # v118 (2026-06-11): cron 일시 비활성화 — V118 forward 검증 기간.
  # 사용자 명령: 메인 채널 발송 cron 끄고 테스트 워크플로우로 검증.
  # 복구 시: 아래 schedule 주석 해제.
  # schedule:
  #   - cron: '58 20 * * 1-5'  # 화~토 KST 05:58 = 월~금 UTC 20:58
  workflow_dispatch:  # 수동 실행만 가능

# v80.7 (2026-05-02): yfinance rate limit 회피 — 테스트 워크플로우와 동시 실행 시
# IP 기반 throttling으로 대량 수집 실패 발생 (5/2 사고: 333개 실패 → SNDK/VIRT 5/1
# 어닝 데이터 stale carry-forward → 매수 후보 오판). 같은 group으로 묶어 직렬화.
concurrency:
  group: yfinance-data-fetch
  cancel-in-progress: false  # 진행 중이면 큐에서 대기 (취소 X)

permissions:
  contents: write  # git push 권한

env:
  TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
  TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
  TELEGRAM_PRIVATE_ID: ${{ secrets.TELEGRAM_PRIVATE_ID }}
  GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
  FRED_API_KEY: ${{ secrets.FRED_API_KEY }}

jobs:
  screening:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4
      with:
        fetch-depth: 0
        token: ${{ secrets.GITHUB_TOKEN }}

    - name: Configure git
      run: |
        git config --local user.email "github-actions[bot]@users.noreply.github.com"
        git config --local user.name "github-actions[bot]"

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'
        cache: 'pip'

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt

    - name: Run EPS Momentum Screening
      run: |
        python daily_runner.py
      env:
        TZ: 'America/New_York'
        MESSAGE_VERSION: 'v3'  # v3 고정 (v2 제거됨)

    - name: Commit and push results
      run: |
        git add -A
        git diff --staged --quiet || git commit -m "Daily update: $(date -u +%Y-%m-%d)"
        git pull --no-rebase -X ours origin master || true
        git push

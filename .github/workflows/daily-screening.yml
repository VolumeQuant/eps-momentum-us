name: Daily EPS Momentum Screening

on:
  # v119 (2026-06-11): cron 재개 — 제3방안(PE<15 저평가 보유) + Top5 진입 + high30 결정적 수정
  #   테스트워크플로우 검증 완료(BE+VRT 진입, 전송 정상, 에러 없음) 후 메인 채널 발송 활성화.
  schedule:
    - cron: '58 20 * * 1-5'  # 화~토 KST 05:58 = 월~금 UTC 20:58
  workflow_dispatch:  # 수동 실행도 가능

# v80.7 (2026-05-02): yfinance rate limit 회피 — 테스트 워크플로우와 동시 실행 시
# IP 기반 throttling으로 대량 수집 실패 발생 (5/2 사고: 333개 실패 → SNDK/VIRT 5/1
# 어닝 데이터 stale carry-forward → 매수 후보 오판). 같은 group으로 묶어 직렬화.
concurrency:
  group: yfinance-data-fetch
  cancel-in-progress: false  # 진행 중이면 큐에서 대기 (취소 X)

permissions:
  contents: write  # git push 권한

env:
  TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
  TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
  TELEGRAM_PRIVATE_ID: ${{ secrets.TELEGRAM_PRIVATE_ID }}
  GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
  FRED_API_KEY: ${{ secrets.FRED_API_KEY }}

jobs:
  screening:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4
      with:
        fetch-depth: 0
        token: ${{ secrets.GITHUB_TOKEN }}

    - name: Configure git
      run: |
        git config --local user.email "github-actions[bot]@users.noreply.github.com"
        git config --local user.name "github-actions[bot]"

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'
        cache: 'pip'

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt

    - name: Run EPS Momentum Screening
      run: |
        python daily_runner.py
      env:
        TZ: 'America/New_York'
        MESSAGE_VERSION: 'v3'  # v3 고정 (v2 제거됨)
        ENTRY_GAP_GATE: '0'    # gap게이트 OFF (2026-06-28 재검토: 인접성 fragile·OFF가 분산 우위로 OFF복귀). 켜려면 '1'.

    # 기대성장(gap) 분산 Sleeve — 별도 시스템 (2026-06-25 빌드).
    # DB 갱신 후 실행. 현재 페이퍼 검증 단계라 개인봇 발송(--send=개인봇 기본).
    # 채널 공개 전환 시 '--send --public'으로 변경. 킬스위치 SLEEVE_DISABLE=1.
    - name: Run Forward-Growth Gap Sleeve (paper, 개인봇)
      run: |
        python gap_sleeve.py --send || echo "gap_sleeve 실패(무시, 메인 파이프라인 무관)"
      env:
        TZ: 'America/New_York'
        # SLEEVE_DISABLE: '1'   # 중단하려면 주석 해제

    - name: Commit and push results
      run: |
        git add -A
        git diff --staged --quiet || git commit -m "Daily update: $(date -u +%Y-%m-%d)"
        git pull --no-rebase -X ours origin master || true
        git push

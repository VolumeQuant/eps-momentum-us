name: Daily EPS Momentum Screening

on:
  schedule:
    # 화~토 KST 05:58 = 월~금 UTC 20:58 (미국 정규장 마감 직후 ~58분)
    # v80: KST 20:00 → 05:58로 변경 (애프터마켓 매매 가정 시 백테스트와 실제 매매 가격 일치)
    # - 미국 정규장 마감: 월~금 16:00 ET = 화~토 05:00~06:00 KST (서머타임 기준)
    # - 애프터마켓: 16:00~20:00 ET (KST 05:00~09:00) — 사용자는 이 시간 종가 근처 가격에 매매 가능
    # - 백테스트는 T일 종가로 매매 시뮬 → 실제도 T일 애프터마켓 매매 → 가격 괴리 최소화
    # - 요일 '1-5' (UTC 월~금): 미국 영업일 마감 직후 매번 실행
    #   • UTC 금 20:58 = KST 토 05:58 → 금요일 마감 데이터를 월요일 장 시작까지 유효
    # - 휴장일은 daily_runner.py에서 자동 스킵
    - cron: '58 20 * * 1-5'
  workflow_dispatch:  # 수동 실행도 가능

permissions:
  contents: write  # git push 권한

env:
  TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
  TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
  TELEGRAM_PRIVATE_ID: ${{ secrets.TELEGRAM_PRIVATE_ID }}
  GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
  FRED_API_KEY: ${{ secrets.FRED_API_KEY }}

jobs:
  screening:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4
      with:
        fetch-depth: 0
        token: ${{ secrets.GITHUB_TOKEN }}

    - name: Configure git
      run: |
        git config --local user.email "github-actions[bot]@users.noreply.github.com"
        git config --local user.name "github-actions[bot]"

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'
        cache: 'pip'

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt

    - name: Run EPS Momentum Screening
      run: |
        python daily_runner.py
      env:
        TZ: 'America/New_York'
        MESSAGE_VERSION: 'v3'  # v3 고정 (v2 제거됨)

    - name: Commit and push results
      run: |
        git add -A
        git diff --staged --quiet || git commit -m "Daily update: $(date -u +%Y-%m-%d)"
        git pull --no-rebase -X ours origin master || true
        git push

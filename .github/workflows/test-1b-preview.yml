name: Test $1B Preview (private bot only)

# $1B 순위 버전 미리보기를 개인봇에만 발송 (production 무변경, 채널 미발송)
on:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  preview:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Install deps
        run: python -m pip install --upgrade pip numpy
      - name: Send $1B preview to private bot
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_PRIVATE_ID: ${{ secrets.TELEGRAM_PRIVATE_ID }}
          # TELEGRAM_CHAT_ID 미설정 → 채널 발송 안 함, 개인봇만
        run: python research/send_1b_preview.py

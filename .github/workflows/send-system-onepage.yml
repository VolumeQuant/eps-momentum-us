name: Send System OnePage
on: {workflow_dispatch: {}}
permissions: {contents: read}
jobs:
  send:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with: {python-version: '3.11'}
      - env: {TELEGRAM_BOT_TOKEN: "${{ secrets.TELEGRAM_BOT_TOKEN }}", TELEGRAM_PRIVATE_ID: "${{ secrets.TELEGRAM_PRIVATE_ID }}"}
        run: python scripts/send_system_onepage.py

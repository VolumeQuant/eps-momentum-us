name: Send blocked-candidate paper tracker (private bot)

on:
  workflow_dispatch:

permissions:
  contents: read

env:
  TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
  TELEGRAM_PRIVATE_ID: ${{ secrets.TELEGRAM_PRIVATE_ID }}

jobs:
  send:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Send paper tracker report
        env:
          WATCH_TICKERS: 'TSEM'
        run: python research/paper_tracker_blocked.py --send

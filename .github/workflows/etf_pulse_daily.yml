name: ETF Pulse Daily

# 매일 한국 시간 06:00 = UTC 21:00 (전일)
on:
  schedule:
    - cron: '0 21 * * *'
  workflow_dispatch:  # 수동 실행 가능

jobs:
  daily-pulse:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies
        run: |
          pip install yfinance pandas matplotlib

      - name: Init DB
        run: python etf_pulse/db_schema.py

      - name: Backfill (first run only — skip on subsequent days)
        run: |
          if [ ! -f etf_pulse/etf_pulse.db ] || [ "$(sqlite3 etf_pulse/etf_pulse.db 'SELECT COUNT(DISTINCT date) FROM etf_daily' 2>/dev/null || echo 0)" -lt 5 ]; then
            python etf_pulse/backfill.py
          fi

      - name: Run daily pipeline
        env:
          GMAIL_USER: ${{ secrets.GMAIL_USER }}
          GMAIL_APP_PASSWORD: ${{ secrets.GMAIL_APP_PASSWORD }}
          TO_EMAILS: ${{ secrets.TO_EMAILS }}
        run: |
          python etf_pulse/run_daily.py

      - name: Generate charts
        run: python etf_pulse/charts.py

      - name: Send email (if configured)
        env:
          GMAIL_USER: ${{ secrets.GMAIL_USER }}
          GMAIL_APP_PASSWORD: ${{ secrets.GMAIL_APP_PASSWORD }}
          TO_EMAILS: ${{ secrets.TO_EMAILS }}
        run: |
          if [ -n "$GMAIL_APP_PASSWORD" ]; then
            # config.json 동적 생성
            cat > etf_pulse/config.json <<EOF
            {
              "gmail_user": "$GMAIL_USER",
              "gmail_app_password": "$GMAIL_APP_PASSWORD",
              "to_emails": $(echo "$TO_EMAILS" | python -c "import sys,json; print(json.dumps(sys.stdin.read().strip().split(',')))")
            }
          EOF
            python etf_pulse/email_sender.py
          fi

      - name: Upload artifacts (콘텐츠 + 차트)
        uses: actions/upload-artifact@v4
        with:
          name: etf-pulse-${{ github.run_id }}
          path: etf_pulse/content/
          retention-days: 30

      - name: Commit DB updates
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add etf_pulse/etf_pulse.db etf_pulse/content/ || true
          git diff --cached --quiet && echo "No changes" || (
            git commit -m "ETF Pulse daily update $(date -u +%Y-%m-%d)" &&
            git push
          )
